<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Exercise 3</title>

    <style>
      div {
        margin-top: 20px;
        margin-bottom: 20px;
      }

      button {
        transition: opacity 0.3s, background-color 0.3s, box-shadow 0.3s;
      }

      .uber-button {
        border: none;
        padding: 11px 20px 11px;
        background-color: black;
        color: white;
        cursor: pointer;
      }

      .uber-button:hover {
        opacity: 0.8;
      }

      .uber-button:active {
        opacity: 0.5;
      }

      .github-button {
        border: none;
        border-radius: 6px;
        height: 40px;
        width: 90px;
        background-color: rgb(46, 164, 79);
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }

      .github-button:hover {
        box-shadow: 0px 3px 5px rgba(0, 0, 0, 0.25);
      }

      .getstarted-button {
        border: none;
        border-radius: 4px;
        height: 40px;
        width: 110px;
        margin-right: 10px;
        background-color: rgb(121, 82, 179);
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      .getstarted-button:hover {
        background-color: rgb(91, 56, 142);
      }

      .download-button {
        border-width: 1px;
        border-radius: 4px;
        border-style: solid;
        border-color: rgb(108, 117, 125);
        height: 40px;
        width: 110px;
        background-color: white;
        color: rgb(108, 117, 125);
        font-weight: bold;
        cursor: pointer;
      }

      .download-button:hover {
        background-color: gray;
        color: white;
      }

      .apply-button {
        border: none;
        height: 40px;
        width: 240px;
        border-radius: 20px;
        background-color: rgb(10, 102, 194);
        color: white;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        margin-right: 10px;
      }

      .apply-button:hover {
        background-color: rgb(14, 78, 142);
      }

      .save-button {
        border-style: solid;
        border-radius: 20px;
        border-color: rgb(10, 102, 194);
        border-width: 1px;
        height: 40px;
        width: 90px;
        background-color: white;
        color: rgb(10, 102, 194);
        font-weight: bold;
        font-size: 15px;
      }

      .save-button:hover {
        background-color: rgb(202, 203, 212);
        border-width: 2px;
      }

      .amazon-button {
        border: none;
        border-radius: 16px;
        height: 33px;
        width: 120px;
        background-color: rgb(255, 216, 20);
        font-weight: bold;
        cursor: pointer;
        margin-right: 10px;
      }

      .amazon-button:hover {
        background-color: rgb(236, 202, 32);
      }

      .amazon-button:active {
        opacity: 0.6;
      }

      .buy-button {
        border: none;
        border-radius: 16px;
        height: 33px;
        width: 120px;
        background-color: rgb(255, 164, 28);
        font-weight: bold;
        cursor: pointer;
      }

      .buy-button:hover {
        background-color: rgb(224, 145, 27);
      }

      .buy-button:active {
        opacity: 0.6;
      }

      .link {
        color: rgb(0, 113, 133);
      }

      .link:hover {
        color: rgb(220, 85, 13);
      }

      .cart {
        font-weight: bold;
        font-size: 25px;
      }

      .price {
        color: rgb(0, 118, 0);
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <button class="uber-button">Request now</button>

    <div>
      <button class="amazon-button">Add to Cart</button>
    </div>

    <div>
      <button class="github-button">Sign up</button>
    </div>

    <div>
      <button class="getstarted-button">Get started</button>
      <button class="download-button">Download</button>
    </div>

    <div>
      <button class="apply-button">Apply on company website</button>
      <button class="save-button">Save</button>
    </div>

    <a href="https://www.amazon.com" class="link">Back to Amazon</a>

    <p class="cart">Nike Black Running Shoes</p>

    <p class="price">$39 - in stock.</p>

    <p>Free delivery tomorrow</p>

    <button class="amazon-button">Add to Cart</button>

    <button class="buy-button">Buy now</button>
  </body>
</html>
